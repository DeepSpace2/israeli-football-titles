<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=100, initial-scale=1.0">
    <title>תארים בתום כל עונה</title>
    <script type="text/javascript" src="data.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
</head>

<body onload="loadData()">
    <div class="container py-4">
        <h1 class="text-center text-light mb-4 display-4 font-weight-bold shadow-sm">תארים בתום כל עונה</h1>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card bg-dark text-white shadow-lg rounded-lg">
                    <div id="championships-chart-title" class="card-header text-center font-weight-bold">אליפויות</div>
                    <div class="card-body graph-container">
                        <canvas id="championships-chart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card bg-dark text-white shadow-lg rounded-lg">
                    <div id="cups-chart-title" class="card-header text-center font-weight-bold">גביעים</div>
                    <div class="card-body graph-container">
                        <canvas id="cups-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.8.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="index.js"></script>
</body>
</html>
